name: Testing code & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # https://docs.djangoproject.com/en/dev/faq/install/#what-python-version-can-i-use-with-django
        include:
          - python-version: "3.9"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.11"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.13"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"
          - python-version: "3.14"
            django-version: "6.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked
          uv pip install "django~=${{ matrix.django-version }}.0"

      - name: Run tests
        run: uv run --no-sync pytest --cov --cov-report=xml

      - name: Upload coverage reports to Codecov
        # optimal value
        if: matrix.python-version == '3.13' && matrix.django-version == '5.2'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
